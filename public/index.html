<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🔑 小窝 AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(145deg,#f5ebe0,#ece0d4);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.06);text-align:center}
.icon{font-size:3.5rem;margin-bottom:12px}
h1{font-size:1.3rem;color:#4a3a3a;font-weight:600;margin-bottom:4px}
.sub{font-size:0.85rem;color:#baaaaa;margin-bottom:28px}
.input-wrap{background:#f5f0ec;border-radius:14px;padding:4px 16px;margin-bottom:16px}
.input-wrap input{width:100%;border:none;background:transparent;padding:14px 0;font-size:1rem;outline:none;color:#3a3a3a}
.input-wrap input::placeholder{color:#baaaaa}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#f5a97f,#e8877a);border:none;border-radius:14px;color:#fff;font-size:1rem;font-weight:bold;cursor:pointer;transition:all .2s;letter-spacing:2px}
.btn:active{transform:scale(0.97)}
.error{color:#e8877a;font-size:0.85rem;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🏠</div>
  <h1>双双的小窝 AI</h1>
  <div class="sub">输入密码开始聊天 ✨</div>
  <div class="input-wrap"><input type="password" id="password" placeholder="密码" autocomplete="off"></div>
  <button class="btn" id="loginBtn">进入聊天</button>
  <div class="error" id="error">密码错误，再试试～</div>
</div>
<script>
const pwd = document.getElementById('password');
const btn = document.getElementById('loginBtn');
const err = document.getElementById('error');

pwd.addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
btn.addEventListener('click', login);

async function login() {
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ password: pwd.value })
  });
  const data = await res.json();
  if (data.success) {
    localStorage.setItem('sstw_token', 'ok');
    window.location.href = '/chat.html';
  } else {
    err.style.display = 'block';
    pwd.value = '';
    pwd.focus();
  }
}
</script>
</body>
</html>
