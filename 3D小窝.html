<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🏠 双双的3D小窝</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a2e;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
#c{width:100vw;height:100vh;display:block}
.sb{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.12);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:8px 20px;z-index:10;display:flex;align-items:center;gap:10px;color:#fff;font-size:.85rem;letter-spacing:1px}
.sd{width:8px;height:8px;border-radius:50%;background:#4CAF50;animation:pl 2s infinite}
@keyframes pl{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,0.4)}50%{box-shadow:0 0 0 8px rgba(76,175,80,0)}}
.db{position:fixed;pointer-events:none;z-index:20;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-radius:16px;padding:12px 20px;color:#3a3a5a;font-size:1rem;box-shadow:0 8px 32px rgba(0,0,0,0.15);max-width:260px;text-align:center;opacity:0;transition:all .3s;transform:translate(-50%,-20px) scale(0.9);line-height:1.5}
.db.s{opacity:1;transform:translate(-50%,-60px) scale(1)}
.db::after{content:'';position:absolute;bottom:-8px;left:50%;width:16px;height:16px;background:rgba(255,255,255,0.95);border-radius:2px;transform:translateX(-50%) rotate(45deg)}
.cp{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.10);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:14px 18px;z-index:10;width:min(650px,94vw);display:flex;flex-direction:column;gap:10px}
.cp .ir{display:flex;gap:8px}
.cp input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 14px;color:#fff;font-size:.9rem;outline:none;transition:all .3s}
.cp input::placeholder{color:rgba(255,255,255,0.3)}
.cp input:focus{border-color:rgba(255,200,150,0.5)}
.cp .sbm{background:linear-gradient(135deg,#f5a97f,#f7c59f);border:none;border-radius:10px;padding:0 18px;color:#1a1a2e;font-weight:bold;cursor:pointer;font-size:.85rem;transition:all .3s;white-space:nowrap}
.cp .sbm:hover{transform:scale(1.04)}
.cp .sbm:disabled{opacity:0.4;cursor:not-allowed}
.cp .tl{display:flex;gap:6px;flex-wrap:wrap}
.cp .tb{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 12px;color:rgba(255,255,255,0.7);font-size:.75rem;cursor:pointer;transition:all .3s}
.cp .tb:hover{background:rgba(255,255,255,0.12);color:#fff}
.ah{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:5px 14px;z-index:10;color:rgba(255,255,255,0.4);font-size:.7rem;pointer-events:none;text-align:center}
</style></head><body>
<div id="c"></div>
<div class="sb"><span class="sd"></span><span id="st">🏠 双双的小窝</span><span id="at" style="color:rgba(255,255,255,0.5);font-size:.8rem"></span></div>
<div class="db" id="db"></div>
<div class="ah" id="ah">💡 点击小人互动</div>
<div class="cp">
<div class="ir"><input id="ti" placeholder="下达任务..." maxlength="100"><button class="sbm" id="sbm">下达</button></div>
<div class="tl" id="tl"></div>
</div>
<script>
(function(){
// HELPERS
var B=function(w,h,d){return new THREE.BoxGeometry(w||1,h||1,d||1)};
var P=function(w,h){return new THREE.PlaneGeometry(w||1,h||1)};
var S=function(r){return new THREE.SphereGeometry(r||0.5,14,14)};
var C=function(t,b,h,s){return new THREE.CylinderGeometry(t||0.5,b||0.5,h||1,s||10)};
var T=function(r,t,a){return new THREE.TorusGeometry(r||0.5,t||0.2,a||6,12,Math.PI)};
var M=function(g,mat){var m=new THREE.Mesh(g,new THREE.MeshStandardMaterial(mat||{}));return m};
var Sc=function(){var s=new THREE.Scene();return s};
var Li=function(c,i,d,p){var l=new THREE.PointLight(c||0xffffff,i||1,d||10);l.position.set(p[0]||0,p[1]||0,p[2]||0);return l};

// Dialogues
var DI={sleeping:['😴 再睡五分钟嘛～','💤 Zzz...','🛌 被子外面好危险'],gaming:['🎮 这波团战！等我！','😤 游戏不能暂停啊！','🔥 看我操作！！'],sofa:['😊 躺平真舒服～','☕ 来杯咖啡？','🧸 抱枕好软～'],happy:['🎉 今天真开心！','🥰 最喜欢你啦！']};
function rd(c){var l=DI[c]||DI.happy;return l[Math.floor(Math.random()*l.length)]}

var TT=[
{title:'🎂 生日策划',steps:[{text:'📅 查看日历天气',d:1200},{text:'🎈 挑选场地',d:1500},{text:'🍰 预订蛋糕',d:1800},{text:'🎁 准备礼物',d:2000},{text:'📋 制定流程',d:1500}]},
{title:'✈️ 旅行规划',steps:[{text:'🗺️ 确定目的地',d:1500},{text:'🌤️ 查询天气',d:1200},{text:'🏨 预订住宿',d:2000},{text:'📸 打卡清单',d:1500},{text:'🧳 打包清单',d:1500}]},
{title:'💖 约会安排',steps:[{text:'🎬 选电影',d:1500},{text:'🍜 挑餐厅',d:1800},{text:'🌆 散步路线',d:1500},{text:'🎁 准备惊喜',d:2000},{text:'📋 时间表',d:1500}]}
];

// ═══ SCENE SETUP ═══
var scene=Sc();
scene.background=new THREE.Color(0x2a2235);
scene.fog=new THREE.Fog(0x2a2235,12,22);

var W=window.innerWidth;
var H=window.innerHeight;
var cam=new THREE.PerspectiveCamera(38,W/H,0.1,100);
cam.position.set(5,4,7);

var ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(W,H);
ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled=true;
ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;
ren.toneMappingExposure=0.85;
document.getElementById('c').appendChild(ren.domElement);

var orb=new THREE.OrbitControls(cam,ren.domElement);
orb.target.set(0,0.3,0);
orb.enableDamping=true;
orb.dampingFactor=0.08;
orb.minDistance=3;
orb.maxDistance=12;
orb.maxPolarAngle=Math.PI/2.2;
orb.update();

// ═══ LIGHTS ═══
scene.add(new THREE.AmbientLight(0xffeeee,0.25));
scene.add(new THREE.HemisphereLight(0xffeedd,0x554466,0.3));

var mL=new THREE.DirectionalLight(0x8899bb,0.2);
mL.position.set(-4,10,-3);
scene.add(mL);

var cL=new THREE.PointLight(0xffaa55,0.6,9);
cL.position.set(0,3.8,-1);
scene.add(cL);

var nL=new THREE.PointLight(0xff7733,0.25,4);
nL.position.set(-1.0,0.7,-3.2);
scene.add(nL);

var dL=new THREE.DirectionalLight(0xffeecc,0.2);
dL.position.set(2.5,1.5,-1.5);
scene.add(dL);

var fL=new THREE.PointLight(0xffdd88,0.1,3);
fL.position.set(3.0,2.8,-2.0);
scene.add(fL);

// ═══ BUILD ROOM ═══
var R=new THREE.Group();
scene.add(R);

// Floor
var fl=M(P(9,9),{color:0x3a3025,roughness:0.9});
fl.rotation.x=-Math.PI/2;
fl.position.set(0,-0.01,0);
fl.receiveShadow=true;
R.add(fl);

// Wood planks
var wc=[0x5a4a3a,0x554438,0x604e3e,0x4f3f32,0x584838,0x524232];
for(var i=0;i<7;i++){
  var p=M(B(0.78,8.5),{color:wc[i%6],roughness:0.85});
  p.rotation.x=-Math.PI/2;
  p.position.set(-3.9+i*0.85,0.003,0);
  p.receiveShadow=true;
  R.add(p);
}

// Walls
var wm={color:0xece3d5,roughness:0.92,side:THREE.DoubleSide};
var bw=M(P(9,4.5),wm);
bw.position.set(0,2.25,-4.5);
R.add(bw);

var lw=M(P(9,4.5),wm);
lw.position.set(-4.5,2.25,0);
lw.rotation.y=Math.PI/2;
R.add(lw);

var rw=M(P(9,4.5),wm);
rw.position.set(4.5,2.25,0);
rw.rotation.y=-Math.PI/2;
R.add(rw);

// Ceiling
var cl=M(P(9,9),{color:0xf2ebe2,roughness:0.95});
cl.rotation.x=Math.PI/2;
cl.position.set(0,4.5,0);
R.add(cl);

// 🪟 WINDOW
var wf=M(B(2.4,2.2,0.04),{color:0xbfae9a});
wf.position.set(4.49,2.2,-1.7);
R.add(wf);

var wp=M(P(2.2,2),{color:0x162233,emissive:0x446688,emissiveIntensity:0.1,transparent:true,opacity:0.4});
wp.position.set(4.49,2.2,-1.7);
R.add(wp);

var wh=M(B(2.1,0.02,0.01),{color:0xbfae9a});
wh.position.set(4.49,2.2,-1.7);
R.add(wh);

var wv=M(B(0.02,1.9,0.01),{color:0xbfae9a});
wv.position.set(4.49,2.2,-1.7);
R.add(wv);

[-0.5,0.5].forEach(function(z){
  var cu=M(P(0.16,2.2),{color:0x6a5a6a,roughness:0.9,side:THREE.DoubleSide});
  cu.position.set(4.49,2.2,-1.7+z);
  cu.rotation.y=0.1;
  R.add(cu);
});

var st=M(B(0.01,0.01,2.4),{color:0x8a7a5a});
st.position.set(4.5,3.3,-1.7);
R.add(st);

// Stars
var sg=new THREE.BufferGeometry();
var sp=[];
for(var i=0;i<30;i++){sp.push(4.48);sp.push(1+Math.random()*2.5);sp.push(-1.7+(Math.random()-0.5)*3)}
sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
R.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.025,transparent:true,opacity:0.3})));

// ═══ BED ═══
var bd=M(B(2.0,0.2,1.7),{color:0x5a4a3a,roughness:0.55});
bd.position.set(-2.2,0.1,-2.5);
bd.castShadow=true;
bd.receiveShadow=true;
R.add(bd);

var mt=M(B(1.92,0.1,1.62),{color:0xf2e8df,roughness:0.82});
mt.position.set(-2.2,0.25,-2.5);
R.add(mt);

var sh=M(B(1.92,0.02,1.0),{color:0xe8d8cf});
sh.position.set(-2.2,0.31,-2.82);
R.add(sh);

[-0.18,0.18].forEach(function(x){
  var p=M(B(0.46,0.06,0.26),{color:0xf5ebe3,roughness:0.82});
  p.position.set(-2.2+x,0.32,-3.28);
  R.add(p);
});

var bl=M(B(1.78,0.04,0.55),{color:0x7a9aaa});
bl.position.set(-2.2,0.33,-1.8);
R.add(bl);

var hb=M(B(2.04,0.55,0.03),{color:0x4a3a2a,roughness:0.5});
hb.position.set(-2.2,0.37,-3.38);
R.add(hb);

// Nightstand
var ns=M(B(0.5,0.45,0.5),{color:0x7a6a5a,roughness:0.55});
ns.position.set(-0.9,0.23,-3.2);
R.add(ns);

var nst=M(B(0.54,0.015,0.54),{color:0x8a7a6a});
nst.position.set(-0.9,0.48,-3.2);
R.add(nst);

var nlb=M(C(0.04,0.05,0.015,8),{color:0xc8b88a});
nlb.position.set(-0.9,0.5,-3.2);
R.add(nlb);

var nls=M(C(0.11,0.06,0.14,12),{color:0xf0e0c0,emissive:0xff8844,emissiveIntensity:0.02});
nls.position.set(-0.9,0.61,-3.2);
R.add(nls);

// 🛋️ SOFA
var sf=M(B(1.4,0.3,0.7),{color:0x6a8a9a,roughness:0.65});
sf.position.set(2.0,0.15,2.0);
sf.castShadow=true;
R.add(sf);

[-0.22,0.22].forEach(function(x){
  var sc=M(B(0.48,0.04,0.55),{color:0x7a9aaa});
  sc.position.set(2.0+x,0.32,2.0);
  R.add(sc);
});

var sb=M(B(1.4,0.38,0.08),{color:0x5a7a8a});
sb.position.set(2.0,0.5,1.62);
sb.castShadow=true;
R.add(sb);

[-0.64,0.64].forEach(function(x){
  var sa=M(B(0.05,0.32,0.7),{color:0x6a8a9a});
  sa.position.set(2.0+x,0.28,2.0);
  R.add(sa);
});

var tp=M(B(0.22,0.035,0.22),{color:0xddaa88});
tp.position.set(2.28,0.35,2.0);
tp.rotation.z=0.2;
R.add(tp);

// 🪑 DESK
var dk=M(B(1.6,0.04,0.8),{color:0x8a7a5a,roughness:0.55});
dk.position.set(2.0,0.68,-1.5);
dk.castShadow=true;
dk.receiveShadow=true;
R.add(dk);

var dr=M(B(0.4,0.28,0.75),{color:0x7a6a4a});
dr.position.set(1.58,0.34,-1.5);
R.add(dr);

// Monitor
var msf=M(B(0.015,0.28,0.015),{color:0x222});
msf.position.set(2.0,0.72,-1.68);
R.add(msf);

var msc=M(B(0.8,0.45,0.015),{color:0x112244,emissive:0x3366cc,emissiveIntensity:0.08});
msc.position.set(2.0,0.88,-1.68);
R.add(msc);

var mfr=M(B(0.85,0.5,0.004),{color:0x111});
mfr.position.set(2.0,0.88,-1.66);
R.add(mfr);

var kb=M(B(0.4,0.012,0.16),{color:0x333344});
kb.position.set(2.0,0.7,-1.33);
R.add(kb);

var mo=M(S(0.03),{color:0x444455});
mo.position.set(2.0,0.7,-1.2);
mo.scale.set(1,0.5,1.5);
R.add(mo);

var mg=M(C(0.06,0.05,0.08,10),{color:0xe8d5c0});
mg.position.set(2.38,0.72,-1.28);
R.add(mg);

// Chair
var ch=M(B(0.46,0.04,0.46),{color:0x2a2a3a,roughness:0.5});
ch.position.set(2.0,0.38,-0.95);
R.add(ch);

var cb=M(B(0.46,0.32,0.015),{color:0x2a2a3a});
cb.position.set(2.0,0.58,-0.73);
R.add(cb);

// 📚 BOOKSHELF (left wall)
[-4.2,-5.0].forEach(function(x){
  var s=M(B(0.015,2.2,0.6),{color:0x7a6a5a,roughness:0.55});
  s.position.set(x,1.1,-4.0);
  R.add(s);
});

[0.2,0.8,1.4,2.0].forEach(function(h){
  var s=M(B(0.78,0.015,0.6),{color:0x7a6a5a});
  s.position.set(-4.6,h,-4.0);
  R.add(s);
});

var bcs=[0xc0392b,0x2980b9,0x27ae60,0x8e44ad,0xd35400,0x1abc9c,0xe74c3c];
[0.35,0.95,1.55].forEach(function(h){
  for(var i=0;i<4;i++){
    var bk=M(B(0.035,0.12+Math.random()*0.08,0.45),{color:bcs[(h*10+i)%bcs.length]});
    bk.position.set(-4.6+(i-1.5)*0.07,h+0.06,-3.72);
    bk.rotation.y=(Math.random()-0.5)*0.03;
    R.add(bk);
  }
});

// 🪴 Plant
var pt=M(C(0.16,0.12,0.2,10),{color:0x6a5a4a});
pt.position.set(3.8,0.1,3.0);
R.add(pt);

[0x3a7a2a,0x4a8a3a,0x2a6a1a].forEach(function(lc){
  for(var i=0;i<4;i++){
    var lf=M(S(0.05+Math.random()*0.02),{color:lc});
    lf.position.set(3.8+(Math.random()-0.5)*0.4,0.28+Math.random()*0.3,3.0+(Math.random()-0.5)*0.35);
    lf.scale.set(1,1.5+Math.random()*0.5,1);
    R.add(lf);
  }
});

// Rug
var rg=M(C(1.2,1.3,0.012,30),{color:0x8a7a6a,roughness:0.9});
rg.position.set(0.2,0.003,0.5);
R.add(rg);

// Ceiling lamp
var clp=M(S(0.1),{color:0xe8d8c0,emissive:0xffaa66,emissiveIntensity:0.02});
clp.position.set(0,4.1,-1);
R.add(clp);

// ═══ BLACKBOARD ═══
var bc=document.createElement('canvas');
bc.width=512;
bc.height=384;
var bx=bc.getContext('2d');

function drBB(items,hi,done){
  bx.fillStyle='#2d4a3e';
  bx.fillRect(0,0,512,384);
  bx.fillStyle='#1a3828';
  bx.fillRect(8,8,496,368);
  bx.fillStyle='#2d4a3e';
  bx.fillRect(12,12,488,360);
  for(var i=0;i<15;i++){bx.fillStyle='rgba(255,255,255,0.01)';bx.beginPath();bx.arc(Math.random()*512,Math.random()*384,Math.random()*3+1,0,Math.PI*2);bx.fill()}
  bx.fillStyle='#fff';
  bx.font='bold 22px \"Segoe UI\",\"PingFang SC\",sans-serif';
  bx.textAlign='center';
  bx.fillText('📋 任 务 板',256,38);
  bx.strokeStyle='rgba(255,255,255,0.08)';
  bx.beginPath();bx.moveTo(56,48);bx.lineTo(456,48);bx.stroke();
  if(!items||!items.length){bx.fillStyle='rgba(255,255,255,0.2)';bx.font='18px';bx.fillText('💭 暂无任务',256,195);return}
  var ss=items[0].steps||items.slice(1);
  bx.fillStyle='#f5d742';
  bx.font='bold 16px';
  bx.textAlign='center';
  bx.fillText((items[0].title||'任务').substring(0,16),256,72);
  var sy=95,lh=32,ms=6;
  ss.slice(0,ms).forEach(function(s,i){var y=sy+i*lh;bx.textAlign='left';
    if(i===hi){bx.fillStyle='#fff';bx.font='bold 13px';bx.fillText('⏳',44,y);bx.fillText(s.text.substring(0,14),72,y)}
    else if(i<hi||done){bx.fillStyle='rgba(160,220,160,0.6)';bx.font='13px';bx.fillText('✅',44,y);bx.fillText(s.text.substring(0,14),72,y)}
    else{bx.fillStyle='rgba(255,255,255,0.25)';bx.font='12px';bx.fillText('⬜',44,y);bx.fillText(s.text.substring(0,14),72,y)}});
  var ts=ss.length;var dc=done?ts:Math.min((hi||0)+(hi<0?0:1),ts);var pct=ts>0?dc/ts:0;
  bx.fillStyle='rgba(255,255,255,0.04)';bx.fillRect(60,sy+ms*lh,392,5);
  bx.fillStyle=pct>=1?'#4CAF50':'#f5d742';bx.fillRect(60,sy+ms*lh,392*pct,5);
  bx.fillStyle='rgba(255,255,255,0.4)';bx.font='11px';bx.textAlign='center';bx.fillText(dc+'/'+ts,256,sy+ms*lh+16);
  if(done){bx.fillStyle='#4CAF50';bx.font='bold 14px';bx.fillText('✅ 完成！🎉',256,sy+ms*lh+34)}
}

var bT=new THREE.CanvasTexture(bc);
var bb=M(P(2.3,1.8),{map:bT,roughness:0.7});
bb.position.set(-1.3,1.8,-4.49);
R.add(bb);

[-1,1].forEach(function(s){
  var bf=M(B(2.38,0.025,0.025),{color:0x7a6a5a});
  bf.position.set(-1.3,s*0.9+1.8,-4.48);
  R.add(bf);
});

[-1,1].forEach(function(s){
  var bf=M(B(0.025,1.83,0.025),{color:0x7a6a5a});
  bf.position.set(-1.3+s*1.15,1.8,-4.48);
  R.add(bf);
});

// ═══ CHARACTER ═══
var Ch=new THREE.Group();

var sh=M(new THREE.CircleGeometry(0.35,16),{color:0x000000,transparent:true,opacity:0.05});
sh.rotation.x=-Math.PI/2;
sh.position.y=0.003;
Ch.add(sh);

// ═══ ANIMATION ═══
var BH={DESK:{p:[2.0,0,-0.95],l:'💻 在电脑前'},BED:{p:[-2.2,0,-2.5],l:'🛌 躺着呢'},SOFA:{p:[2.0,0,2.0],l:'🛋️ 在沙发上'},BB:{p:[-1.3,0,-4.0],l:'📝 在黑板上'}};
var curB='DESK',bTimer=0,moving=false,mT=null,mS=null,mP=0,mC=null,taskRunning=false;
var dbEl=document.getElementById('db');
var dT=null;

function showD(t,d){
  dbEl.textContent=t;
  dbEl.classList.add('s');
  if(dT)clearTimeout(dT);
  dT=setTimeout(function(){dbEl.classList.remove('s')},d||3000);
  var p=new THREE.Vector3();
  Ch.getWorldPosition(p);
  p.y+=1.5;
  p.project(cam);
  dbEl.style.left=((p.x*0.5+0.5)*window.innerWidth)+'px';
  dbEl.style.top=((-p.y*0.5+0.5)*window.innerHeight)+'px';
}

var rC=new THREE.Raycaster();
var p2=new THREE.Vector2();

ren.domElement.addEventListener('click',function(e){
  p2.x=(e.clientX/window.innerWidth)*2-1;
  p2.y=-(e.clientY/window.innerHeight)*2+1;
  rC.setFromCamera(p2,cam);
  if(rC.intersectObjects(Ch.children,true).length>0){
    if(taskRunning){showD('⏳ 任务中～');return}
    switch(curB){case'BED':showD(rd('sleeping'));break;case'DESK':showD(rd('gaming'));break;case'SOFA':showD(rd('sofa'));break;default:showD(rd('happy'))}
  }
});

function mv(bk,cb){
  var t=BH[bk];if(!t)return;
  mS=Ch.position.clone();
  mT=new THREE.Vector3(t.p[0],0,t.p[2]);
  mP=0;moving=true;mC=cb;
  document.getElementById('ah').textContent='🚶 走过去...';
}

function anim(dt){
  if(moving&&mT){
    mP+=dt*0.5;
    if(mP>=1){mP=1;moving=false;Ch.position.copy(mT);Ch.rotation.y=0;
      var dd=[[BH.BED,'BED'],[BH.SOFA,'SOFA'],[BH.DESK,'DESK'],[BH.BB,'BB']];
      var md=99,mk='DESK';
      dd.forEach(function(v){var d=Ch.position.distanceTo(new THREE.Vector3(v[0].p[0],0,v[0].p[2]));if(d<md){md=d;mk=v[1]}});
      curB=mk;
      document.getElementById('at').textContent=BH[mk].l;
      document.getElementById('ah').textContent='💡 点击小人互动';
      if(mC)mC();return}
    var t=mP*mP*(3-2*mP);
    Ch.position.lerpVectors(mS,mT,t);
    Ch.position.y=Math.sin(mP*Math.PI)*0.03;
    var d2=new THREE.Vector3().copy(mT).sub(mS);
    if(d2.length()>0.01&&mP<0.95)Ch.rotation.y=Math.atan2(d2.x,d2.z);
    return;
  }
  switch(curB){
    case'BED':Ch.rotation.x=-Math.PI/2;Ch.position.y=-0.12;break;
    case'SOFA':Ch.rotation.x=-0.1;Ch.position.y=-0.05;break;
    default:Ch.rotation.x=0;Ch.position.y=0;
  }
  bTimer+=dt;
  if(!moving&&!taskRunning&&bTimer>7+Math.random()*5){
    bTimer=0;
    var bs=['DESK','BED','SOFA'];
    var nx;
    do{nx=Math.floor(Math.random()*bs.length)}while(bs[nx]===curB);
    mv(bs[nx]);
  }
}

// ═══ TASK ═══
var bItems=[],taskStep=-1,tskS=[];

function execTask(title,steps){
  if(taskRunning)return;
  taskRunning=true;taskStep=-1;tskS=[].concat(steps);
  bItems=[{title:title,steps:steps}];
  drBB(bItems,-1,false);
  bT.needsUpdate=true;
  document.getElementById('sbm').disabled=true;
  document.querySelectorAll('.tb').forEach(function(b){b.disabled=true});
  document.getElementById('ah').textContent='📋 执行...';
  mv('BB',function(){document.getElementById('st').textContent='📝 拆解...';setTimeout(function(){nxt()},800)});
}

function nxt(){
  taskStep++;
  if(taskStep>=tskS.length){done();return}
  drBB(bItems,taskStep,false);bT.needsUpdate=true;
  document.getElementById('st').textContent='⏳ '+tskS[taskStep].text;
  setTimeout(function(){nxt()},tskS[taskStep].d||1500);
}

function done(){
  drBB(bItems,tskS.length-1,true);bT.needsUpdate=true;
  document.getElementById('st').textContent='🎉 完成！';
  document.getElementById('ah').textContent='🎉 全部完成！';
  showD('🎉 完成啦！',3000);
  setTimeout(function(){
    mv(Math.random()>0.5?'SOFA':'BED',function(){
      taskRunning=false;
      document.getElementById('sbm').disabled=false;
      document.querySelectorAll('.tb').forEach(function(b){b.disabled=false});
      document.getElementById('ah').textContent='💡 点击小人互动';
      document.getElementById('st').textContent='🏠 双双的小窝';
      setTimeout(function(){bItems=[];drBB([],-1,false);bT.needsUpdate=true},5000);
    });
  },2000);
}

// ═══ UI ═══
document.getElementById('tl').innerHTML='';
TT.forEach(function(t){
  var b=document.createElement('button');
  b.className='tb';
  b.textContent=t.title;
  b.onclick=function(){if(!taskRunning)execTask(t.title,t.steps)};
  document.getElementById('tl').appendChild(b);
});

document.getElementById('sbm').onclick=function(){
  var v=document.getElementById('ti').value.trim();
  if(!v||taskRunning)return;
  var m=null;
  TT.forEach(function(t){if(t.title.includes(v)||v.includes(t.title))m=t});
  if(m){execTask(m.title,m.steps)}else{execTask('📋 '+v.substring(0,12),[{text:'📥 接收任务',d:1200},{text:'🔍 分析中',d:1500},{text:'📝 拆解中',d:1500},{text:'⚙️ 执行',d:1500},{text:'✅ 完成',d:1000}])}
};

document.getElementById('ti').addEventListener('keydown',function(e){
  if(e.key==='Enter')document.getElementById('sbm').click()
});

// ═══ MAIN LOOP ═══
var clock=new THREE.Clock();

(function loop(){
  var dt=clock.getDelta();
  orb.update();
  anim(dt);
  if(dbEl.classList.contains('s')){
    var p=new THREE.Vector3();
    Ch.getWorldPosition(p);
    p.y+=1.5;
    p.project(cam);
    dbEl.style.left=((p.x*0.5+0.5)*window.innerWidth)+'px';
    dbEl.style.top=((-p.y*0.5+0.5)*window.innerHeight)+'px';
  }
  ren.render(scene,cam);
  requestAnimationFrame(loop);
})();

window.addEventListener('resize',function(){
  cam.aspect=window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
  ren.setSize(window.innerWidth,window.innerHeight);
});

drBB([],-1,false);
bT.needsUpdate=true;
document.getElementById('st').textContent='🏠 双双的小窝';
console.log('🏠 3D小窝 v3');
})();
</script></body></html>
