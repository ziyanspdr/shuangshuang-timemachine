let popTimer=null;

const hotspots=[];
function addHotspot(pos,title,msg){
  const h={pos:new THREE.Vector3(pos[0],pos[1],pos[2]),title:title,msg:msg};
  hotspots.push(h);
  // Glow sphere
  var o=M(R2(0.06),{color:0xffdd88,emissive:0xffaa44,emissiveIntensity:0.2,transparent:true,opacity:0.6},pos);Hm.add(o);
  // Ring
  var o=M(new THREE.RingGeometry(0.08,0.1,16),{color:0xffdd88,transparent:true,opacity:0.3,side:THREE.DoubleSide},pos);
  o.rotation.x=-Math.PI/2;Hm.add(o);
}

// Raycaster for interaction
const rC=new THREE.Raycaster(),p2=new THREE.Vector2();
let highlighted=null;

function showPop(pos,text){
  popEl.textContent=text;popEl.classList.add('s');
  const p=new THREE.Vector3(pos[0],pos[1]+0.5,pos[2]);
  p.project(C);
  const x=(p.x*0.5+0.5)*window.innerWidth;
  const y=(-p.y*0.5+0.5)*window.innerHeight;
  popEl.style.left=x+'px';popEl.style.top=y+'px';
  if(popTimer)clearTimeout(popTimer);
  popTimer=setTimeout(()=>{popEl.classList.remove('s')},4000);
}

R.domElement.addEventListener('click',function(e){
  p2.x=(e.clientX/W)*2-1;p2.y=-(e.clientY/H)*2+1;
  rC.setFromCamera(p2,C);
  const objs=Hm.children.filter(c=>c.isMesh&&c.material.emissive);
  const hits=rC.intersectObjects(Hm.children);
  if(hits.length>0){
    const p=hits[0].point;
    let closest=null,minD=99;
    hotspots.forEach(h=>{
      const d=p.distanceTo(h.pos);
      if(d<minD){minD=d;closest=h}
    });
    if(closest&&minD<0.5) showPop(closest.pos,closest.title+'\n'+closest.msg);
  }
});

// Animate glow rings
function animGlow(time){
  hotspots.forEach((h,i)=>{
    const ring=Hm.children.filter(c=>c.geometry.type==='RingGeometry')[i];
    if(ring){
      ring.rotation.x=-Math.PI/2+Math.sin(time*0.5+i)*0.05;
      ring.scale.setScalar(1+Math.sin(time*2+i)*0.15);
    }
  });
}

[[0x88aacc,-2.5,2.0,2.0],[0xcc88aa,2.5,2.0,-2.0]].forEach(([c,x,y,z])=>{
  var o=M(P(0.5,0.6),{color:c,roughness:0.4},[x,y,z]);Hm.add(o);
  var o=M(B(0.56,0.66,0.008),{color:0x8a7a5a},[x,y,z-0.01]);Hm.add(o);
});

// Skylight glow patches
[0,4.5,0].forEach(()=>{});

Hm.add(new THREE.AmbientLight(0xffeedd,0.15));

S.add(Hm);

// === SMALL CHARACTER ===
const Ch=new THREE.Group();
const sC=0xf5d0b8;
var o=M(R2(0.15),{color:sC,roughness:0.35},[0,0.55,0]);Ch.add(o);
var o=M(R2(0.12),{color:0x3a2a1a,roughness:0.8},[0,0.65,0.04]);o.scale.set(1.1,0.35,1.0);Ch.add(o);
var o=M(Cyl(0.2,0.24,0.4,12),{color:0x8ab5d0,roughness:0.6},[0,0.2,0]);Ch.add(o);
[-0.05,0.05].forEach(x=>{
  var o=M(R2(0.02),{color:0x2a2a44},[x,0.55,0.14]);Ch.add(o);
});
var o=M(new THREE.TorusGeometry(0.02,0.005,4,8,Math.PI),{color:0xcc8877},[0,0.51,0.16]);
o.rotation.x=Math.PI/2;o.rotation.z=0.1;Ch.add(o);

Ch.position.set(1.5,0,1.0);
S.add(Ch);

// Animation
let bPhase=0;

function anim(dt){
  bPhase+=dt;
  // Character subtle idle
  Ch.position.y=Math.sin(bPhase*0.8)*0.015;
  Ch.rotation.y=Math.sin(bPhase*0.3)*0.05;
  // Glow rings
  const rings=Hm.children.filter(c=>c.geometry&&c.geometry.type==='RingGeometry');
  rings.forEach((r,i)=>{
    r.scale.setScalar(1+Math.sin(bPhase*1.5+i)*0.15);
    r.material.opacity=0.2+Math.sin(bPhase*2+i*0.7)*0.1;
  });
}

// === LOOP ===
const clock=new THREE.Clock();
(function loop(){
  const dt=clock.getDelta();
  OC.update();
  anim(dt);
  R.render(S,C);
  requestAnimationFrame(loop);
})();

window.addEventListener('resize',()=>{
  C.aspect=window.innerWidth/window.innerHeight;
  C.updateProjectionMatrix();
  R.setSize(window.innerWidth,window.innerHeight);
});

console.log('🏠 三室一厅已上线！');
console.log('💡 点击发光的互动点查看介绍');
})();
</script></body></html>
